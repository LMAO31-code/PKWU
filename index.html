<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>SCRIPTORIA</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>SCRIPTORIA ✨</h1>
<p>Aplikasi menulis novel dan membuat proposal</p>

<div class="container">

<h2>Editor Novel</h2>

<input type="text" id="judul" placeholder="Judul novel">

<textarea id="novel" placeholder="Tulis draft novelmu di sini..."></textarea>

<button onclick="simpanDraft()">Simpan Draft</button>
<button onclick="hapusDraft()">Hapus Draft</button>

<h2>Pembuat Proposal</h2>

<input type="text" id="topik" placeholder="Topik proposal">

<textarea id="referensi" placeholder="Masukkan referensi artikel atau link"></textarea>

<button onclick="buatProposal()">Generate Proposal</button>

<h3>Hasil Proposal</h3>
<div id="hasil"></div>

</div>

<script src="script.js"></script>

</body>
</html>
